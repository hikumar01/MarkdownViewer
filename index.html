<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarkdownViewer</title>
    <!-- Set html.dark before any CSS renders to prevent a flash of light-themed
         content on startup. Reads the persisted theme preference from
         localStorage (set by theme.ts) so manual overrides survive reload.
         Must be an inline script (not a module) so it runs synchronously
         during HTML parsing, before the first paint. -->
    <script>
      var _p = localStorage.getItem('markview-theme')
      var _dark = _p === 'dark' ||
        (_p !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
      if (_dark) document.documentElement.classList.add('dark')
    </script>
    <script type="module" src="/ui/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <div id="search-bar">
        <input id="search-input" type="search" placeholder="Find in document…" autocomplete="off" spellcheck="false" />
        <span id="search-count" aria-live="polite"></span>
        <button id="search-prev" class="search-btn" title="Previous (Shift+Enter)">↑</button>
        <button id="search-next" class="search-btn" title="Next (Enter)">↓</button>
        <button id="search-close" class="search-btn" title="Close (Escape)">✕</button>
      </div>

      <!-- hidden until a file is loaded; .markdown-body activates github-markdown-css -->
      <main id="content" class="markdown-body" hidden></main>

      <div id="welcome">
        <h1>Markdown Viewer</h1>
        <p>Open a markdown file to preview it</p>
        <p class="hint">File → Open File…</p>
      </div>
    </div>
  </body>
</html>
