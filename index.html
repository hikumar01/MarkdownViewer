<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>markview</title>
    <!-- main.ts imports github-markdown-css and app.css as side-effects -->
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">

      <!--
        Main content area.
        Hidden until a file is loaded; shown by main.ts after first render.
        The .markdown-body class activates github-markdown-css styling.
      -->
      <main id="content" class="markdown-body" hidden></main>

      <!-- Welcome screen — visible when no file is open -->
      <div id="welcome">
        <h1>markview</h1>
        <p>Open a markdown file to preview it</p>
        <button id="open-btn" type="button">Open file…</button>
        <p class="hint">⌘O · or drag a .md file here</p>
      </div>

      <!--
        Drag-and-drop overlay.
        Shown (via body.drag-over selector in app.css) while a .md file is
        being dragged over the window. aria-hidden prevents screen readers
        from announcing the overlay text during normal operation.
      -->
      <div id="drop-overlay" aria-hidden="true">
        <span>Drop to open</span>
      </div>

    </div>
  </body>
</html>
