<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarkdownViewer</title>
    <script type="module" src="/ui/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <!-- hidden until a file is loaded; .markdown-body activates github-markdown-css -->
      <main id="content" class="markdown-body" hidden></main>

      <div id="welcome">
        <h1>Markdown Viewer</h1>
        <p>Open a markdown file to preview it</p>
        <p class="hint">File → Open File…</p>
      </div>
    </div>
  </body>
</html>
